name: Feature Request
description: Suggest a new feature or improvement
title: "[Feature]: "
labels: ["enhancement"]

body:

* type: markdown
  attributes:
  value: |
  Thank you for suggesting a feature!

* type: textarea
  id: problem
  attributes:
  label: Problem
  description: Describe the problem this feature would solve.
  placeholder: What limitation are you facing?
  validations:
  required: true

* type: textarea
  id: solution
  attributes:
  label: Proposed Solution
  description: Describe the feature or solution you would like to see.

* type: textarea
  id: alternatives
  attributes:
  label: Alternatives Considered
  description: Describe any alternative solutions or features you've considered.

* type: textarea
  id: additional_context
  attributes:
  label: Additional Context
  description: Add any other context, screenshots, or examples here.
