{% extends "base.html" %}
{% load static %}
{% block title %}Log Out — JAMBReady{% endblock %}

{% block topbar %}
<header class="er-topbar">
  <a href="{% url 'home' %}" class="er-topbar__brand">
    <div class="er-topbar__logo">
      <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="M2 3h6a4 4 0 0 1 4 4v14a3 3 0 0 0-3-3H2z"/><path d="M22 3h-6a4 4 0 0 0-4 4v14a3 3 0 0 1 3-3h7z"/></svg>
    </div>
    JAMBReady
  </a>
</header>
{% endblock %}

{% block tabbar %}{% endblock %}

{% block content %}
<div class="auth-shell">
  <div class="auth-card" style="text-align:center;">

    <div style="width:64px;height:64px;border-radius:50%;background:var(--red-100);display:flex;align-items:center;justify-content:center;margin:0 auto 20px;">
      <svg width="28" height="28" viewBox="0 0 24 24" fill="none" stroke="var(--red-500)" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"/><polyline points="16 17 21 12 16 7"/><line x1="21" y1="12" x2="9" y2="12"/></svg>
    </div>

    <h1 class="auth-card__title">Log out?</h1>
    <p class="auth-card__sub" style="margin-bottom:24px;">You'll need to log back in to continue practising.</p>

    <form method="post">
      {% csrf_token %}
      <button type="submit" class="profile-logout-btn" style="margin-bottom:12px;">
        Yes, log me out
      </button>
    </form>

    <a href="{% url 'profile' %}" class="er-btn-secondary">Cancel</a>

  </div>
</div>
{% endblock %}
